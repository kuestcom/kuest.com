name = "kuest-com"
main = "src/worker.ts"
compatibility_date = "2026-07-10"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"

[[kv_namespaces]]
binding = "SESSION"
id = "40240d0e161c4646b11e7f78894ed4ed"

[images]
binding = "IMAGES"

[vars]
AFFILIATE_BATCH_LIMIT = "25"
AFFILIATE_CHAIN_ID = "80002"
AFFILIATE_CONFIRMATIONS = "64"
AFFILIATE_DATA_API_URL = "https://data-api.kuest.com"
AFFILIATE_DEPOSIT_WALLET_FACTORY = "0x2CcdC6C5dDcd895aFcCD259F291de9b618A5cA6c"
AFFILIATE_KUEST_FEE_RECEIVER = "0x645E67CC15DAE4F312dc941fA190c52E7d598c67"
AFFILIATE_MAX_ATTEMPTS = "8"
AFFILIATE_MAX_HISTORY_PAGES = "20"
AFFILIATE_RPC_URL = "https://polygon-amoy.drpc.org"
AFFILIATE_START_BLOCK = "0"
AFFILIATE_DRY_RUN = "true"
AFFILIATE_TOKEN_DECIMALS = "6"
GITHUB_APP_URL = "https://github-app.kuest.com"
KUEST_CHAIN_MODE = "amoy"
PROTOCOL_PITCH_DECK_TO_EMAIL = "hello@kuest.com"
RATE_LIMIT_DOMAIN_MAX = "90"
RATE_LIMIT_DOMAIN_REGISTER_MAX = "600"
RATE_LIMIT_LAUNCH_MAX = "30"
RATE_LIMIT_PROTOCOL_DECK_MAX = "12"
RATE_LIMIT_REOWN_CONNECTION_MAX = "240"
RATE_LIMIT_SUPABASE_RESOURCES_MAX = "240"
RATE_LIMIT_VERCEL_CONNECTION_MAX = "240"
RATE_LIMIT_WINDOW_MS = "600000"
RESEND_FROM_EMAIL = "Kuest <hello@kuest.com>"
SITE_URL = "https://kuest.com"

[triggers]
crons = []

[[d1_databases]]
binding = "AFFILIATE_DB"
database_name = "kuest-affiliates"
migrations_dir = "migrations"

[secrets]
required = [
  "REOWN_APPKIT_PROJECT_ID",
  "RESEND_API_KEY",
  "DUB_API_KEY",
  "SUPABASE_ANON_KEY",
  "SUPABASE_SERVICE_ROLE_KEY",
  "SUPABASE_URL",
  "VERCEL_OAUTH_CLIENT_ID",
  "VERCEL_OAUTH_CLIENT_SECRET",
]
