minimumReleaseAge: 1440
shellEmulator: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # semver 6 is required by Babel/Next/Sentry transitive tooling.
  - semver@6.3.1
  # slow-redact is pinned through pino -> @walletconnect/logger.
  - slow-redact@0.3.2
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
allowBuilds:
  '@parcel/watcher': false
  '@reown/appkit': false
  '@swc/core': false
  bufferutil: false
  keccak: false
  sharp: false
  utf-8-validate: false
overrides:
  '@wagmi/connectors': 6.2.0
  '@wagmi/core': 2.22.1
